name: PR Checks
on:
  pull_request:
    branches:
      - main
jobs:
  api-unit-tests:
    runs-on: node24
        
    steps:
      - name: checkout code
        uses: actions/checkout@v6
      - name: Enable Corepack and set Yarn 4
        run: |
          corepack enable     
      - name: install packages
        run: yarn install --immutable
        working-directory: ./apps/api
      - name: run tests
        run: yarn vitest run --project unit-tests
        working-directory: ./apps/api